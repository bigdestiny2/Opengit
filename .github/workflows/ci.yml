name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      OPENGIT_HOME: ${{ runner.temp }}/opengit-home
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

      - name: Check licenses
        run: node scripts/check-licenses.js

      - name: Run tests
        run: npm test
